<svg width="1280" height="380" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fable Skills — Expert-level thinking for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0A1F"/>
      <stop offset="0.5" stop-color="#1A1340"/>
      <stop offset="1" stop-color="#0E0B24"/>
    </linearGradient>
    <linearGradient id="title" x1="200" y1="120" x2="1080" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="0.45" stop-color="#FF5E8A"/>
      <stop offset="0.8" stop-color="#B06AFF"/>
      <stop offset="1" stop-color="#6A8BFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="0.5" stop-color="#FF5E8A"/>
      <stop offset="1" stop-color="#6A8BFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#B06AFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#B06AFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="380" rx="24" fill="url(#bg)"/>
  <ellipse cx="640" cy="150" rx="620" ry="240" fill="url(#glow)"/>

  <!-- subtle grid dots -->
  <g fill="#FFFFFF" opacity="0.05">
    <circle cx="80"  cy="60"  r="2"/><circle cx="160" cy="60" r="2"/><circle cx="240" cy="60" r="2"/>
    <circle cx="1040" cy="320" r="2"/><circle cx="1120" cy="320" r="2"/><circle cx="1200" cy="320" r="2"/>
    <circle cx="1120" cy="80" r="2"/><circle cx="1200" cy="80" r="2"/>
    <circle cx="80" cy="320" r="2"/><circle cx="160" cy="320" r="2"/>
  </g>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1280" height="6" rx="3" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="640" y="96" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" letter-spacing="8"
        font-weight="600" fill="#9C95C9">OPEN-SOURCE SKILL PACK FOR CLAUDE CODE</text>

  <!-- title -->
  <text x="640" y="210" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="800"
        letter-spacing="2" fill="url(#title)" filter="url(#soft)" opacity="0.55">FABLE SKILLS</text>
  <text x="640" y="210" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="800"
        letter-spacing="2" fill="url(#title)">FABLE SKILLS</text>

  <!-- tagline -->
  <text x="640" y="268" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500"
        fill="#E7E3FF">17 expert minds, summoned with a single command.</text>

  <!-- chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="372" y="300" width="160" height="44" rx="22" fill="#FFFFFF" opacity="0.06"/>
      <rect x="372" y="300" width="160" height="44" rx="22" fill="none" stroke="#FF5E8A" stroke-opacity="0.5"/>
      <text x="452" y="328" text-anchor="middle" fill="#FFB39C">/fable-frontend</text>
    </g>
    <g>
      <rect x="548" y="300" width="150" height="44" rx="22" fill="#FFFFFF" opacity="0.06"/>
      <rect x="548" y="300" width="150" height="44" rx="22" fill="none" stroke="#B06AFF" stroke-opacity="0.5"/>
      <text x="623" y="328" text-anchor="middle" fill="#D9C2FF">/fable-backend</text>
    </g>
    <g>
      <rect x="714" y="300" width="194" height="44" rx="22" fill="#FFFFFF" opacity="0.06"/>
      <rect x="714" y="300" width="194" height="44" rx="22" fill="none" stroke="#6A8BFF" stroke-opacity="0.5"/>
      <text x="811" y="328" text-anchor="middle" fill="#C2D0FF">/fable-security</text>
    </g>
  </g>
</svg>
